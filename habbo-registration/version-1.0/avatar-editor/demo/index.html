<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habbo Registration v1.0</title>
    <link rel="stylesheet" href="demo.css">
    <!-- Import map for externalized dependencies — browser resolves bare specifiers via these mappings.
         Old: libdepixelize-wasm + comlink bundled into a 318 KB code-split chunk by Vite.
         New: Separate files in libs/, shared with other page components via browser cache.
         Dev mode: Vite dev server rewrites bare specifiers to full paths — import map not used. -->
    <script type="importmap">
      {
        "imports": {
          "libdepixelize-wasm": "./libs/libdepixelize-wasm.js",
          "comlink": "./libs/comlink.js"
        }
      }
    </script>
    <script>
      window.HabboRegistrationConfig = {
        // figure: '1750118022210132810129003',
        // gender: 'M',
        // container: "editor-container",
        backgroundColor: "#FFFFFF",
        textColor: "#333333",
        // assetsPath: "./assets/", // Only needed for non-Vite host pages — overrides embedded atlas
        // localization_url: "data/figure_editor.xml", // Only needed if overriding embedded default
        // post_enabled: false,
        // post_url: "/look?",
        // post_figure: "figure",
        // post_gender: "gender",
      };
      window.HabboRegistration = {
        setGenderAndFigure: function (gender, figure) {
          console.log("Bridge: setGenderAndFigure", gender, figure);
        },
        setAllowedToProceed: function (allowed) {
          console.log("Bridge: setAllowedToProceed", allowed);
        },
        onSubmit: function (gender, figure) {
          console.log("Bridge: onSubmit", gender, figure);
        },
      };
    </script>
  </head>
  <body>
    <h1>HabboRegistration v1.0 - HTML5 Port</h1>
    <p class="info">Canvas-based avatar editor | 406x327</p>
    <div id="editor-container"></div>
    <script type="module" src="../src/index.tsx"></script>
  </body>
</html>
